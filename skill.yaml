name: paper-webpage-builder
version: 0.3.0
description: Build polished single-page academic project webpages from paper sources, figures, references, and validation scripts.
prompts:
  skill: SKILL.md
  module_patterns: references/module_patterns.md
  design_principles: references/design_principles.md
schemas:
  input: schemas/input.schema.json
  output: schemas/output.schema.json
tests:
  golden: tests/golden.jsonl
commands:
  run_case: "python3 scripts/sit_run_case.py --input {input} --output {output}"
runtime:
  model: configurable
  temperature: 0
tags:
  - codex-skill
  - paper-webpage
  - sithub

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Paper Webpage Builder promotional card</title>
  <desc id="desc">A promotional social card showing Overleaf paper sources converted into polished academic project webpages.</desc>
  <defs>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Paper Webpage Builder logo mark</title>
  <desc id="desc">A paper sheet transformed into a project webpage with figure and table blocks.</desc>
  <defs>
    <linearGradient id="paperGradient" x1="42" y1="36" x2="158" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf4ff"/>
    </linearGradient>
    <linearGradient id="webGradient" x1="98" y1="78" x2="224" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563a8"/>
      <stop offset="1" stop-color="#41a88a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#14243a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="56" fill="#f7fbff"/>
  <path d="M28 42h88l42 42v118H28z" fill="url(#paperGradient)" stroke="#d7e3ef" stroke-width="8" filter="url(#softShadow)"/>
  <path d="M116 42v42h42" fill="#dcecff" stroke="#d7e3ef" stroke-width="8" stroke-linejoin="round"/>
  <path d="M52 95h58M52 120h72M52 145h50" fill="none" stroke="#5f7188" stroke-width="9" stroke-linecap="round"/>
  <rect x="50" y="164" width="78" height="16" rx="8" fill="#e06020" opacity="0.92"/>

  <rect x="86" y="72" width="142" height="122" rx="18" fill="url(#webGradient)" filter="url(#softShadow)"/>
  <rect x="98" y="86" width="118" height="22" rx="8" fill="#ffffff" opacity="0.96"/>
  <circle cx="110" cy="97" r="4" fill="#e06020"/>
  <circle cx="124" cy="97" r="4" fill="#41a88a"/>
  <circle cx="138" cy="97" r="4" fill="#2563a8"/>

  <rect x="100" y="124" width="52" height="42" rx="8" fill="#ffffff" opacity="0.94"/>
  <path d="M110 155l12-13 9 8 10-15 8 20z" fill="#41a88a"/>
  <circle cx="116" cy="135" r="6" fill="#f6b15b"/>

  <rect x="162" y="124" width="48" height="8" rx="4" fill="#ffffff" opacity="0.96"/>
  <rect x="162" y="141" width="48" height="8" rx="4" fill="#ffffff" opacity="0.74"/>
  <rect x="162" y="158" width="36" height="8" rx="4" fill="#ffffff" opacity="0.74"/>
